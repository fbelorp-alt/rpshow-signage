name: Build APK Android

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Perfil de build'
        required: true
        default: 'tb10'
        type: choice
        options:
          - tb50
          - tb10plus
          - tb10
          - tb60
          - t10plus
          - tb1
          - preview

jobs:
  build:
    name: Build APK (${{ github.event.inputs.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar pnpm
        run: npm install -g pnpm@10

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Instalar dependências do workspace
        run: pnpm install --frozen-lockfile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Instalar Android NDK (se ausente)
        run: |
          NDK_VERSION="27.1.12297006"
          NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
          if [ ! -d "$NDK_PATH" ]; then
            echo "Instalando NDK $NDK_VERSION..."
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;$NDK_VERSION"
          else
            echo "NDK $NDK_VERSION já instalado — pulando."
          fi

      - name: Build APK local (sem fila EAS)
        working-directory: artifacts/player-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_DOMAIN: vnnox-tracker.replit.app
          EAS_NO_VCS: '1'
          EAS_SKIP_AUTO_FINGERPRINT: '1'
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile }} \
            --local \
            --non-interactive \
            --output /tmp/app-release.apk

      - name: Validar ABI + permissões (aapt)
        run: |
          set -e
          PROFILE="${{ github.event.inputs.profile }}"
          # Determinar ABI esperada por perfil
          case "$PROFILE" in
            tb1|t10plus) EXPECT_ABI="armeabi-v7a" ;;
            tb10|tb10plus|tb60) EXPECT_ABI="arm64-v8a" ;;
            tb50) EXPECT_ABI="multi" ;;
            *) EXPECT_ABI="" ;;
          esac
          # Instalar aapt se necessário
          which aapt || ($ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" > /dev/null 2>&1 && ln -sf $ANDROID_HOME/build-tools/34.0.0/aapt /usr/local/bin/aapt)
          BADGING=$(aapt dump badging /tmp/app-release.apk 2>/dev/null || true)
          echo "--- native-code ---"
          echo "$BADGING" | grep "native-code" || echo "(nenhuma)"
          echo "--- REQUEST_INSTALL_PACKAGES ---"
          if echo "$BADGING" | grep -q "REQUEST_INSTALL_PACKAGES"; then
            echo "FAIL: REQUEST_INSTALL_PACKAGES presente — ViPlex rejeita"
            exit 1
          else
            echo "OK: REQUEST_INSTALL_PACKAGES ausente"
          fi
          # Validar ABI se perfil específico
          if [ -n "$EXPECT_ABI" ] && [ "$EXPECT_ABI" != "multi" ]; then
            if echo "$BADGING" | grep "native-code" | grep -q "$EXPECT_ABI"; then
              echo "OK: ABI $EXPECT_ABI confirmada"
            else
              echo "FAIL: ABI $EXPECT_ABI não encontrada"
              exit 1
            fi
          fi
          # Validar via zipfile também
          python3 - <<PY
          import zipfile, sys
          z = zipfile.ZipFile("/tmp/app-release.apk")
          abis = sorted({n.split("/")[1] for n in z.namelist() if n.startswith("lib/") and n.count("/") >= 2})
          size_mb = round(sum(i.file_size for i in z.infolist()) / 1024 / 1024, 1)
          print(f"APK ABIs: {abis} | size: {size_mb} MB")
          PY

      - name: Renomear APK com perfil, versão e ABI
        run: |
          VERSION=$(cat artifacts/player-app/app.config.js | grep "version:" | head -1 | tr -d " '\"," | cut -d: -f2)
          PROFILE="${{ github.event.inputs.profile }}"
          case "$PROFILE" in
            tb1|t10plus) ABI_SUFFIX="armeabi-v7a" ;;
            tb10|tb10plus|tb60) ABI_SUFFIX="arm64-v8a" ;;
            tb50) ABI_SUFFIX="fat" ;;
            *) ABI_SUFFIX="universal" ;;
          esac
          FILENAME="RPShow-${PROFILE}-v${VERSION}-${ABI_SUFFIX}.apk"
          cp /tmp/app-release.apk /tmp/${FILENAME}
          echo "APK_FILENAME=${FILENAME}" >> $GITHUB_ENV
          echo "APK gerado: $FILENAME"

      - name: Upload APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: RPShow-${{ github.event.inputs.profile }}-v${{ github.run_number }}
          path: /tmp/${{ env.APK_FILENAME }}
          retention-days: 30

      - name: Resumo do build
        run: |
          echo "## ✅ APK Gerado!" >> $GITHUB_STEP_SUMMARY
          echo "- **Perfil:** ${{ github.event.inputs.profile }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Versão:** $(cat artifacts/player-app/app.config.js | grep "version:" | head -1 | tr -d " '\"," | cut -d: -f2)" >> $GITHUB_STEP_SUMMARY
          echo "- **Build #:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Baixe o APK na aba **Artifacts** desta execução" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.profile }}" = "tb1" ]; then
            echo "- **ABI:** armeabi-v7a (TB1 / ViPlex)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.profile }}" = "tb10" ]; then
            echo "- **ABI:** arm64-v8a (TB10)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.profile }}" = "t10plus" ]; then
            echo "- **ABI:** armeabi-v7a + JSC (T10 Plus — 32-bit)" >> $GITHUB_STEP_SUMMARY
          fi
