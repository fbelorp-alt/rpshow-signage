openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SignageOS - Digital Signage Management Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: storage
    description: File upload and serving
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: clients
    description: Client management
  - name: screens
    description: Screen/device management
  - name: media
    description: Media library
  - name: playlists
    description: Playlist management
  - name: schedules
    description: Schedule management
  - name: dashboard
    description: Dashboard summaries
  - name: player
    description: TV player endpoint
  - name: reports
    description: Play history and reporting

paths:
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      responses:
        '302':
          description: Redirect to the returnTo path on success.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'

  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an uploaded file
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File content
          content:
            '*/*':
              schema:
                type: string
                format: binary

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /screens:
    get:
      operationId: listScreens
      tags: [screens]
      summary: List all screens
      parameters:
        - name: clientId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of screens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Screen"
    post:
      operationId: createScreen
      tags: [screens]
      summary: Register a new screen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScreenInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Screen"

  /screens/{id}:
    get:
      operationId: getScreen
      tags: [screens]
      summary: Get a screen by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Screen details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Screen"
    patch:
      operationId: updateScreen
      tags: [screens]
      summary: Update a screen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScreenUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Screen"
    delete:
      operationId: deleteScreen
      tags: [screens]
      summary: Delete a screen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /screens/pair:
    post:
      operationId: pairScreen
      tags: [screens]
      summary: Register a new screen via user pairing code (called from TVBox)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairScreenInput"
      responses:
        "201":
          description: Screen registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairScreenResult"
        "404":
          description: Pairing code not found

  /media:
    get:
      operationId: listMedia
      tags: [media]
      summary: List all media files
      parameters:
        - name: clientId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of media files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaFile"
    post:
      operationId: createMedia
      tags: [media]
      summary: Add a media file (URL-based)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaFile"

  /media/{id}:
    get:
      operationId: getMedia
      tags: [media]
      summary: Get a media file by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Media file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaFile"
    patch:
      operationId: updateMedia
      tags: [media]
      summary: Rename / update a media file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                url:
                  type: string
                thumbnailUrl:
                  type: string
                  nullable: true
                durationSeconds:
                  type: integer
                  nullable: true
                metaJson:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaFile"
    delete:
      operationId: deleteMedia
      tags: [media]
      summary: Delete a media file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /playlists:
    get:
      operationId: listPlaylists
      tags: [playlists]
      summary: List all playlists
      parameters:
        - name: clientId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of playlists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Playlist"
    post:
      operationId: createPlaylist
      tags: [playlists]
      summary: Create a new playlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaylistInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playlist"

  /playlists/{id}:
    get:
      operationId: getPlaylist
      tags: [playlists]
      summary: Get a playlist with its items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Playlist with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistDetail"
    patch:
      operationId: updatePlaylist
      tags: [playlists]
      summary: Update a playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaylistUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playlist"
    delete:
      operationId: deletePlaylist
      tags: [playlists]
      summary: Delete a playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /playlists/{id}/items:
    post:
      operationId: addPlaylistItem
      tags: [playlists]
      summary: Add a media item to a playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaylistItemInput"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistItem"

  /playlists/{id}/items/reorder:
    patch:
      operationId: reorderPlaylistItems
      tags: [playlists]
      summary: Reorder playlist items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [itemId, position]
                    properties:
                      itemId:
                        type: integer
                      position:
                        type: integer
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /playlists/{id}/items/{itemId}:
    patch:
      operationId: updatePlaylistItem
      tags: [playlists]
      summary: Update a playlist item (duration, position)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                durationSeconds:
                  type: integer
                position:
                  type: integer
                objectFit:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistItem"
    delete:
      operationId: removePlaylistItem
      tags: [playlists]
      summary: Remove a media item from a playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      summary: List all schedules
      parameters:
        - name: screenId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schedule"
    post:
      operationId: createSchedule
      tags: [schedules]
      summary: Create a new schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"

  /schedules/{id}:
    patch:
      operationId: updateSchedule
      tags: [schedules]
      summary: Update a schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    delete:
      operationId: deleteSchedule
      tags: [schedules]
      summary: Delete a schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /schedules/broadcast:
    post:
      operationId: broadcastPlaylist
      tags: [schedules]
      summary: Send a playlist to ALL screens of the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastInput"
      responses:
        "200":
          description: Broadcast applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastResult"
        "401":
          description: Unauthorized

  /reports/plays:
    get:
      operationId: listPlayHistory
      tags: [reports]
      summary: Get play history log
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
        - name: screenId
          in: query
          required: false
          schema:
            type: integer
        - name: startDate
          in: query
          required: false
          description: ISO date string (start of period, BRT)
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          description: ISO date string (end of period, BRT)
          schema:
            type: string
      responses:
        '200':
          description: Play history
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlayHistoryItem'
                  total:
                    type: integer

  /reports/period-summary:
    get:
      operationId: getReportPeriodSummary
      tags: [reports]
      summary: Get per-media play counts for a date period
      parameters:
        - name: screenId
          in: query
          required: false
          schema:
            type: integer
        - name: startDate
          in: query
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Per-media summary for the period
          content:
            application/json:
              schema:
                type: object
                required: [items, totalPlays]
                properties:
                  totalPlays:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PeriodSummaryItem'

  /reports/summary:
    get:
      operationId: getReportSummary
      tags: [reports]
      summary: Get aggregated play statistics
      responses:
        '200':
          description: Aggregated stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSummary'

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get overall dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /player/{screenCode}:
    get:
      operationId: getPlayerPlaylist
      tags: [player]
      summary: Get current playlist for a screen (used by TV player)
      parameters:
        - name: screenCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current playlist to play
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerPayload"
        "404":
          description: Screen not found

  /screen-groups:
    get:
      operationId: listScreenGroups
      tags: [screen-groups]
      summary: List all screen groups
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScreenGroup"
    post:
      operationId: createScreenGroup
      tags: [screen-groups]
      summary: Create a screen group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                color: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreenGroup"

  /screen-groups/{id}:
    patch:
      operationId: updateScreenGroup
      tags: [screen-groups]
      summary: Update a screen group
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                color: { type: string }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreenGroup"
    delete:
      operationId: deleteScreenGroup
      tags: [screen-groups]
      summary: Delete a screen group
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /screen-groups/{id}/assign:
    post:
      operationId: assignScreenToGroup
      tags: [screen-groups]
      summary: Assign a screen to a group
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [screenId]
              properties:
                screenId: { type: integer }
      responses:
        "204":
          description: Assigned

  /screen-groups/{id}/unassign:
    post:
      operationId: unassignScreenFromGroup
      tags: [screen-groups]
      summary: Remove a screen from its group
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [screenId]
              properties:
                screenId: { type: integer }
      responses:
        "204":
          description: Unassigned

  /screen-groups/{id}/push:
    post:
      operationId: pushPlaylistToGroup
      tags: [screen-groups]
      summary: Push a playlist to all screens in a group
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [playlistId]
              properties:
                playlistId: { type: integer }
      responses:
        "200":
          description: Pushed
          content:
            application/json:
              schema:
                type: object
                properties:
                  pushed: { type: integer }

  /emergency:
    get:
      operationId: listEmergencyAlerts
      tags: [emergency]
      summary: List emergency alerts
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmergencyAlert"
    post:
      operationId: createEmergencyAlert
      tags: [emergency]
      summary: Create and activate an emergency alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string }
                bgColor: { type: string }
                textColor: { type: string }
                durationMinutes: { type: integer }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyAlert"

  /emergency/active:
    get:
      operationId: getActiveEmergencyAlert
      tags: [emergency]
      summary: Get the currently active emergency alert
      responses:
        "200":
          description: Active alert or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyAlert"

  /emergency/{id}:
    delete:
      operationId: cancelEmergencyAlert
      tags: [emergency]
      summary: Cancel an emergency alert
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Cancelled

  /player/{screenCode}/play:
    post:
      operationId: logMediaPlay
      tags: [player]
      summary: Log a media play event (called by TV player when a media finishes)
      parameters:
        - name: screenCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayEvent'
      responses:
        '204':
          description: Logged

  /player/{screenCode}/heartbeat:
    post:
      operationId: heartbeat
      tags: [player]
      summary: Update screen last-seen timestamp (called by TV player every minute)
      parameters:
        - name: screenCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: OK
        "404":
          description: Screen not found

