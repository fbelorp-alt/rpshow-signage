kind = "mobile"
previewPath = "/player-app/"
title = "SignageOS Player"
version = "1.0.0"
id = "artifacts/player-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/player-app/" ]
localPort = 20032

[services.development]
run = "pnpm --filter @workspace/player-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/player-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/player-app", "run", "serve" ]

[services.env]
PORT = "20032"
BASE_PATH = "/player-app/"
